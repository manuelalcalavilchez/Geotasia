version: "3.8"

services:
  # Development Environment (with Hot Module Replacement & live-reloading)
  app-dev:
    build:
      context: .
      target: development
    container_name: geotasalia-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000

  # Production Environment (Optimized, self-contained build)
  app-prod:
    build:
      context: .
      target: runner
    container_name: geotasalia-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
